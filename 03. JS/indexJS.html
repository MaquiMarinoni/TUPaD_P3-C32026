<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food store</title>
    <link rel="stylesheet" href="/03. JS/css/styles.css">
</head>

<body>
    <header>
        <h1>Food store</h1>
        <nav>
            <ul>
                <li><a href="#">Inicio</a></li>
                <li><a href="#">Mis pedidos</a></li>
                <li><a href="#">Carrito</a></li>
                <li><a href="/01. HTML/admin.html">Panel admin</a></li>
            </ul>
        </nav>
    </header>

    <hr>

    <div id="layout">
        <!-- aside: barra lateral -->
        <aside> 
            <h2>Categorias</h2>
            <ul id="lista-categorias">
            </ul>
        </aside>


        <main>
            <section>
                <!-- Campo de busqueda de producto + boton  -->
                <form id="formulario-busqueda">
                    <label for="buscarProducto">¿Qué te gustaría comer hoy?</label>
                    <input id="buscarProducto" type="text" placeholder="Ej: hamburguesa doble, cheddar, bacon, etc.">
                    <div class="botones-busqueda-container">
                        <button type="submit">Buscar</button>
                        <button type="button" id="btn-ver-todos">Mostrar todos</button>
                    </div>
                </form>
            </section>
            <hr>
            <section>
                <!-- grilla de productos -->
                <h2>Productos Destacados</h2>
                <section id="contenedor-productos"></section>

            </section>
        </main>
    
    </div>
    
    <hr>

    <footer>
        <p>&copy; 2026 Food Store. Todos los derechos reservados.</p>
        <p>Contactanos: <a href="mailto:info@foodstore.com">info@foodstore.com</a></p>
    </footer>
    
     <!-- Colocar los scripts al final es una buena practica ya que asegra que el HTML se cargue ANTES de que JS intente manipuarlo  -->
    <script src="./js/data.js"></script>
    <script src="./js/main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food store</title>
    <link rel="stylesheet" href="./src/css/styles.css">
</head>

<body>
    <header>
        <h1>Food store</h1>
        <nav>
            <ul>
                <li><a href="/index.html">Inicio</a></li>
                <li><a href="/src/pages/client/home/index.html">Mis pedidos</a></li>
                <li><a href="/src/pages/client/carrito/carrito.html">Carrito</a></li>
                <li><a href="/src/pages/admin/home/index.html">Panel admin</a></li>
                <li><a href="/src/pages/auth/login/index.html" id="btn-auth">Login</a></li>
                <button id="btn-logout" style="display: none;">Cerrar Sesión</button>
            </ul>
        </nav>
    </header>

    <hr>

    <div id="layout">
        <!-- aside: barra lateral -->
        <aside> 
            <h2>Categorias</h2>
            <ul id="lista-categorias"></ul>
        </aside>

        <main>
            <section>
                <!-- Campo de busqueda de producto + boton  -->
                <form id="formulario-busqueda">
                    <label for="buscarProducto">¿Qué te gustaría comer hoy?</label>
                    <input id="buscarProducto" type="text" placeholder="Ej: hamburguesa doble, cheddar, bacon, etc.">
                    <div class="botones-busqueda-container">
                        <button type="submit">Buscar</button>
                        <button type="button" id="btn-ver-todos">Mostrar todos</button>
                    </div>
                </form>
            </section>
            <hr>
            <section>
                <!-- grilla de productos -->
                <h2>Productos Destacados</h2>
                <section id="contenedor-productos">
                    <h1>Loading...</h1>
                </section>

            </section>
        </main>
    
    </div>
    
    <hr>

    <footer>
        <p>&copy; 2026 Food Store. Todos los derechos reservados.</p>
        <p>Contactanos: <a href="mailto:info@foodstore.com">info@foodstore.com</a></p>

    <script type="module" src="/src/main.ts"></script>

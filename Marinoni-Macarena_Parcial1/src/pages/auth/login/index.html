<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Food Store - Iniciar Sesión</title>
    <link rel="stylesheet" href="../../../css/styles.css">
</head>
<body class="auth-page"> <div class="auth-container">
        <header class="auth-header">
            <h1>FOOD <strong>STORE</strong></h1>
            <h2>Iniciar Sesión</h2>
        </header>

        <form id="login-form" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>

            <button type="submit" class="btn-ingresar">INGRESAR</button>
        </form>

        <footer class="auth-footer">
            <p>¿No tienes cuenta? <a href="../registro/index.html">Regístrate aquí</a></p>
            <a href="../../../../index.html" class="back-link">Volver al inicio</a>
        </footer>
    </div>

    <script type="module" src="./login.ts"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Food Store - Crear Cuenta</title>
    <link rel="stylesheet" href="../../../css/styles.css">
</head>
<body class="auth-page">

    <div class="auth-container">
        <header class="auth-header">
            <h1>FOOD <strong>STORE</strong></h1>
            <h2>Crear Cuenta</h2>
        </header>

        <form id="registro-form" class="auth-form">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
            </div>

            <button type="submit" class="btn-ingresar">REGISTRARSE</button>
        </form>

        <footer class="auth-footer">
            <p>¿Ya tienes cuenta? <a href="../login/index.html">Inicia sesión aquí</a></p>
            <a href="../../../../index.html" class="back-link">Volver al inicio</a>
        </footer>
    </div>

    <script type="module" src="./registro.ts"></script>
</body>
</html>

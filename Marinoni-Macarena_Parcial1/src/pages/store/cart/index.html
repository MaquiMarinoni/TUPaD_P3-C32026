<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tu Carrito - Food Store</title>
    <link rel="stylesheet" href="../../../css/styles.css">
</head>

<body class="cart-page">

    <header class="main-header">
        <div class="header-container">
            <h1 class="logo">Food<strong>Store</strong></h1>
            <a href="../home/index.html" class="nav-link">Seguir comprando</a>
        </div>
    </header>

    <main class="cart-main-container">
        <h1 class="cart-title-main">Mi Carrito</h1>

        <div class="cart-layout">
            <section class="cart-items-list" id="cart-items-container">
                <div class="cart-item-card">
                    <img src="../../../assets/pizza.jpg" alt="Producto" class="item-img-mini">
                    <div class="item-info-main">
                        <h4>Torta Rogel</h4>
                        <p class="item-cat-tag">Postres</p>
                        <p class="item-subtotal-text">Subtotal: <strong>$3.500</strong></p>
                    </div>
                    <div class="item-controls-wrapper">
                        <div class="qty-selector">
                            <button class="btn-qty">-</button>
                            <span class="qty-num">1</span>
                            <button class="btn-qty">+</button>
                        </div>
                        <button class="btn-delete-text">Eliminar</button>
                    </div>
                </div>
            </section>

            <aside class="cart-sidebar-summary">
                <div class="summary-card-modern">
                    <h3>Resumen</h3>
                    <div class="summary-details">
                        <div class="summary-line">
                            <span>Subtotal</span>
                            <span id="subtotal">$0</span>
                        </div>
                        <div class="summary-line total-big">
                            <span>Total</span>
                            <span id="total-final">$0</span>
                        </div>
                    </div>
                    
                    <button class="btn-checkout-modern" disabled>Finalizar compra</button>
                    <p class="checkout-warning">
                        <i class="fas fa-exclamation-triangle"></i> 
                        El checkout no está disponible en esta versión.
                    </p>
                    
                    <button id="btn-vaciar" class="btn-clear-cart">Vaciar carrito</button>
                </div>
            </aside>
        </div>
    </main>

    <script type="module" src="./cart.ts"></script>

</body>
</html>

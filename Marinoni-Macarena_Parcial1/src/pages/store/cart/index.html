<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Carrito - Food Store</title>
    <link rel="stylesheet" href="../../../css/styles.css">
</head>
<body>
    <header>
        <h1>Carrito de productos</h1>
        <a href="/index.html">Volver a la Tienda</a>
        <button id="btn-clear-cart">Vaciar Carrito</button>
    </header>

    <main class="container">
        <ul id="cart-items"></ul>
        
        <div id="cart-total-container">
            <h3>Total a pagar: $<span id="total-price">0</span></h3>
        </div>

        <p id="empty-cart-msg" style="display: none;">Tu carrito está vacío. ¡Ve a la tienda a buscar algo rico!</p>
    </main>

    <script type="module" src="./cart.ts"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control</title>
</head>
<body>

    <h1>Panel de Administración</h1>
    <p>Bienvenido. Aquí podés ver y agregar productos.</p>
    
    <a href="index.html">Volver a la tienda</a>

    <hr>

    <h2>Productos Actuales</h2>
    <table border="1">
        <tr>
            <th>Nombre</th>
            <th>Precio</th>
        </tr>
        <tr>
            <td>Hamburguesa Triple</td>
            <td>$25000</td>
        </tr>
        <tr>
            <td>Pizza Muzzarella</td>
            <td>$18000</td>
        </tr>
    </table>

    <hr>

    <h2>Cargar nuevo producto</h2>
    <form>
        <p>Nombre del producto:</p>
        <input type="text">

        <p>Precio:</p>
        <input type="number">

        <p>Descripción:</p>
        <textarea></textarea>

        <br><br>
        <button type="submit">Guardar</button>
    </form>

</body>
</html>
